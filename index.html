<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Suite di strumenti gratuiti per la modifica di immagini e utilità digitali.">
    <meta name="theme-color" content="#f2f2f7">
    
    <title>CronoTools - Convertitore & Suite Creativa</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* --- Home Specific Overrides --- */
        
        /* Hero Section Animation */
        .hero-section {
            opacity: 0;
            animation: fadeInDown 0.8s forwards ease-out;
            margin-bottom: 40px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* Tool Search Bar Styling */
        .tool-search-wrapper {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            transform-origin: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tool-search-wrapper:focus-within {
            transform: scale(1.02);
        }

        .tool-search-input {
            width: 100%;
            padding: 18px 24px 18px 54px;
            font-size: 16px;
            border-radius: 20px;
            border: 1px solid var(--separator);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .tool-search-input:focus {
            background: var(--bg-secondary);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-dim);
        }

        .tool-search-input::placeholder {
            color: var(--text-tertiary);
        }

        .tool-search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            opacity: 0.7;
        }

        /* Converter Layout */
        .main-tool-wrapper {
            max-width: 600px;
            margin: 0 auto 60px;
            animation: fadeUp 0.6s 0.2s forwards;
            opacity: 0;
        }

        .converter-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .converter-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .format-opt {
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            user-select: none;
        }

        .format-opt:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        .format-opt.active {
            background: var(--bg-secondary);
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        /* Quality Slider Transitions */
        .quality-slider-container {
            margin: 0 0 20px 0;
            padding: 0 10px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .quality-slider-container.visible {
            max-height: 80px;
            opacity: 1;
            margin-bottom: 20px;
        }

        .quality-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            height: 4px;
            background: var(--separator);
            border-radius: 2px;
            outline: none;
        }

        /* Drag & Drop Upload Area Enhancements */
        .upload-area {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .upload-area.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }

        /* Result Area */
        .result-container {
            text-align: center;
            animation: fadeIn 0.4s;
        }

        .preview-box {
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0ibm9uZSI+PHBhdGggZmlsbD0iI2YyZjJmNyIgZD0iTTAgMGgxMHYxMEgwem0xMCAxMGgxMHYxMEgxMHoiLz48cGF0aCBmaWxsPSIjZmZmZmZmIiBkPSJNMTAgMGgxMHYxMEgxMHptLTEwIDEwaDEwdjEwSDB6Ii8+PC9zdmc=');
            border: 1px solid var(--separator);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 380px;
            border-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .output-textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--separator);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            font-size: 15px;
        }

        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--accent); color: white; flex: 2; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); flex: 1; }

        /* Tools Grid Section */
        .other-tools-section {
            padding-top: 20px;
            animation: fadeUp 0.6s 0.4s forwards;
            opacity: 0;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }

        .tool-card {
            background: var(--bg-secondary);
            border: 1px solid var(--separator);
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .tool-name {
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* Utility Classes */
        .hidden { display: none !important; }
        .hidden-tool { display: none !important; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <crono-navbar></crono-navbar>

    <div class="content-wrapper">
        
        <header class="hero-section">
            <h1 class="hero-title">CronoTools</h1>
            <p class="hero-subtitle">Il tuo coltellino svizzero digitale.</p>
            
            <div class="tool-search-wrapper">
                <svg class="tool-search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input 
                    type="text" 
                    id="tool-search" 
                    class="tool-search-input" 
                    placeholder="Cerca strumento (es. taglia, ridimensiona...)" 
                    autocomplete="off"
                >
            </div>
        </header>

        <main>
            <div class="main-tool-wrapper">
                <div class="glass-card" style="padding: 24px;">
                    
                    <div class="converter-header">
                        <div class="converter-title">Convertitore Rapido</div>
                    </div>
                    
                    <div class="format-grid">
                        <div class="format-opt active" data-mime="image/png" data-ext="PNG">PNG</div>
                        <div class="format-opt" data-mime="image/jpeg" data-ext="JPG">JPG</div>
                        <div class="format-opt" data-mime="image/webp" data-ext="WEBP">WEBP</div>
                        <div class="format-opt" data-mime="base64" data-ext="BASE64">Base64</div>
                    </div>

                    <div id="quality-wrapper" class="quality-slider-container">
                        <div class="quality-label">
                            <span>Qualità Compressione</span> 
                            <span id="quality-val">90%</span>
                        </div>
                        <input type="range" id="quality-input" min="10" max="100" value="90">
                    </div>

                    <div id="upload-stage" class="upload-area">
                        <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp, image/svg+xml" hidden>
                        
                        <div class="upload-content" style="pointer-events: none;">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; margin-bottom: 12px; color: var(--accent);">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <div class="upload-title">Trascina o Clicca</div>
                            <div class="upload-desc">Supporta JPG, PNG, WEBP, SVG</div>
                        </div>
                    </div>

                    <div id="result-stage" class="result-container hidden">
                        <div id="img-preview-container" class="preview-box">
                            <img id="result-img" alt="Anteprima Risultato">
                        </div>
                        
                        <div id="base64-container" class="hidden">
                            <textarea id="base64-output" class="output-textarea" readonly onclick="this.select()"></textarea>
                            <p style="font-size: 12px; color: var(--success); margin-bottom: 15px; display: none;" id="copy-feedback">Copiato!</p>
                        </div>

                        <div class="btn-group">
                            <button id="btn-download" class="btn btn-primary">Scarica</button>
                            <button id="btn-reset" class="btn btn-secondary">Nuova Immagine</button>
                        </div>
                    </div>
                </div>
            </div>

            <section class="other-tools-section">
                <div class="tools-grid" id="tools-grid">
                    
                    <a href="filtri/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                        <span class="tool-name">Filtri</span>
                    </a>

                    <a href="crop-immagini/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"></path><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"></path></svg>
                        <span class="tool-name">Ritaglia</span>
                    </a>

                    <a href="ridimensiona/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>
                        <span class="tool-name">Ridimensiona</span>
                    </a>

                    <a href="colora/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                        <span class="tool-name">Colora</span>
                    </a>

                    <a href="taglia-video/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        <span class="tool-name">Taglia Video</span>
                    </a>

                    <a href="flip-immagini/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                        <span class="tool-name">Specchia</span>
                    </a>

                    <a href="ruota-immagini/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><path d="M2.5 2v6h6M2.66 15.57a10 10 0 1 0 .57-8.38"></path></svg>
                        <span class="tool-name">Ruota</span>
                    </a>

                    <a href="base64/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        <span class="tool-name">Convertitore</span>
                    </a>

                    <a href="qr/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        <span class="tool-name">QR Code</span>
                    </a>

                    <a href="Ai/index.html" class="tool-card">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px; opacity:0.8;"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12L2.1 11.5"></path><path d="M12 12l9.9-0.5"></path></svg>
                        <span class="tool-name">AI Remove</span>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <script src="js/ui.js"></script>
    <script src="components/navbar.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initSearch();
            initConverter();
        });

        /* =========================================
           1. SEARCH LOGIC
           ========================================= */
        function initSearch() {
            const searchInput = document.getElementById('tool-search');
            const grid = document.getElementById('tools-grid');
            const cards = grid.querySelectorAll('.tool-card');

            searchInput.addEventListener('keyup', (e) => {
                const query = e.target.value.toLowerCase().trim();

                cards.forEach(card => {
                    const name = card.querySelector('.tool-name').textContent.toLowerCase();
                    // Controlla se il nome contiene la query
                    const match = name.includes(query);
                    
                    if (match) {
                        card.classList.remove('hidden-tool');
                        // Reset animazione per feedback visivo
                        card.style.animation = 'none';
                        card.offsetHeight; /* trigger reflow */
                        card.style.animation = 'fadeIn 0.3s forwards';
                    } else {
                        card.classList.add('hidden-tool');
                    }
                });
            });
        }


        /* =========================================
           2. CONVERTER LOGIC (ROBUST)
           ========================================= */
        function initConverter() {
            // Stato interno
            const state = {
                file: null,
                imgObject: null,
                mime: 'image/png', // Default PNG
                ext: 'PNG',
                quality: 0.9
            };

            // Elementi DOM
            const uploadArea = document.getElementById('upload-stage');
            const fileInput = document.getElementById('file-input');
            const resultStage = document.getElementById('result-stage');
            const formatOpts = document.querySelectorAll('.format-opt');
            const qualityWrap = document.getElementById('quality-wrapper');
            const qualityInput = document.getElementById('quality-input');
            const qualityVal = document.getElementById('quality-val');
            const resultImg = document.getElementById('result-img');
            const base64Container = document.getElementById('base64-container');
            const previewContainer = document.getElementById('img-preview-container');
            const base64Output = document.getElementById('base64-output');
            const btnDownload = document.getElementById('btn-download');
            const btnReset = document.getElementById('btn-reset');

            // --- Gestione Formati ---
            formatOpts.forEach(opt => {
                opt.addEventListener('click', () => {
                    // UI Update
                    formatOpts.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');

                    // State Update
                    state.mime = opt.dataset.mime;
                    state.ext = opt.dataset.ext;

                    // Toggle Quality Slider
                    const supportsQuality = (state.mime === 'image/jpeg' || state.mime === 'image/webp');
                    if (supportsQuality) {
                        qualityWrap.classList.add('visible');
                    } else {
                        qualityWrap.classList.remove('visible');
                    }

                    // Se abbiamo già un'immagine, rigeneriamo il risultato
                    if (state.imgObject) processImage();
                });
            });

            // --- Gestione Quality Slider ---
            qualityInput.addEventListener('input', (e) => {
                state.quality = parseInt(e.target.value) / 100;
                qualityVal.textContent = e.target.value + '%';
                
                // Debounce leggero per performance su immagini grandi
                if (window.renderTimeout) clearTimeout(window.renderTimeout);
                window.renderTimeout = setTimeout(() => {
                    if (state.imgObject) processImage();
                }, 50);
            });

            // --- Gestione Upload (Click) ---
            uploadArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    loadFile(e.target.files[0]);
                }
            });

            // --- Gestione Upload (Drag & Drop) ---
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => uploadArea.classList.add('drag-over'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('drag-over'), false);
            });

            uploadArea.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files && files[0]) loadFile(files[0]);
            });


            // --- Core Functions ---

            function loadFile(file) {
                // Check tipo file
                if (!file.type.match('image.*')) {
                    alert("Per favore carica solo file immagine.");
                    return;
                }

                state.file = file;
                const reader = new FileReader();

                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        state.imgObject = img;
                        showResultStage();
                        processImage(); // Prima elaborazione
                    };
                    img.src = e.target.result;
                };

                reader.readAsDataURL(file);
            }

            function showResultStage() {
                uploadArea.classList.add('hidden');
                resultStage.classList.remove('hidden');
            }

            function processImage() {
                if (!state.imgObject) return;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = state.imgObject.width;
                canvas.height = state.imgObject.height;

                // Gestione Trasparenza per JPG (Sfondo Bianco)
                if (state.mime === 'image/jpeg') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // Disegno immagine
                ctx.drawImage(state.imgObject, 0, 0);

                // Export
                if (state.mime === 'base64') {
                    // Modalità Base64 (usa PNG come sorgente dati)
                    const dataUrl = canvas.toDataURL('image/png');
                    
                    previewContainer.classList.add('hidden');
                    base64Container.classList.remove('hidden');
                    btnDownload.classList.add('hidden'); // Non si scarica il base64 come file qui
                    
                    base64Output.value = dataUrl;
                } else {
                    // Modalità Immagine (PNG, JPG, WEBP)
                    const dataUrl = canvas.toDataURL(state.mime, state.quality);
                    
                    previewContainer.classList.remove('hidden');
                    base64Container.classList.add('hidden');
                    btnDownload.classList.remove('hidden');

                    resultImg.src = dataUrl;

                    // Setup Download Button
                    btnDownload.onclick = () => {
                        const link = document.createElement('a');
                        link.download = `crono-converted-${Date.now()}.${state.ext.toLowerCase()}`;
                        link.href = dataUrl;
                        link.click();
                    };
                }
            }

            // --- Reset ---
            btnReset.addEventListener('click', () => {
                state.file = null;
                state.imgObject = null;
                fileInput.value = ''; // Reset input
                
                resultStage.classList.add('hidden');
                uploadArea.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
